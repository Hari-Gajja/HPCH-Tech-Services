<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>New Project Inquiry - HPCH Tech</title>
  <style type="text/css">
    /* Reset styles */
    body, table, td, p, a, li, blockquote {
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
    }
    table, td {
      mso-table-lspace: 0pt;
      mso-table-rspace: 0pt;
    }
    img {
      -ms-interpolation-mode: bicubic;
      border: 0;
      height: auto;
      line-height: 100%;
      outline: none;
      text-decoration: none;
    }
    
    /* Mobile Responsive Styles */
    @media only screen and (max-width: 620px) {
      .wrapper {
        padding: 12px !important;
      }
      .container {
        width: 100% !important;
        min-width: 100% !important;
      }
      .header-cell {
        padding: 40px 24px !important;
      }
      .content-cell {
        padding: 32px 24px !important;
      }
      .message-cell {
        padding: 0 24px 32px 24px !important;
      }
      .cta-cell {
        padding: 0 24px 32px 24px !important;
      }
      .footer-cell {
        padding: 24px !important;
      }
      .info-card {
        padding: 20px !important;
      }
      .logo-text {
        font-size: 32px !important;
      }
      .header-title {
        font-size: 14px !important;
        letter-spacing: 4px !important;
      }
      .tagline {
        font-size: 11px !important;
      }
      .section-label {
        font-size: 10px !important;
      }
      .info-value {
        font-size: 15px !important;
      }
      .message-text {
        font-size: 14px !important;
      }
      .cta-button {
        padding: 16px 32px !important;
        font-size: 12px !important;
      }
      .stat-number {
        font-size: 24px !important;
      }
    }
  </style>
</head>
<body style="margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0a0a0a;">
  <table role="presentation" class="wrapper" style="width: 100%; border-collapse: collapse;">
    <tr>
      <td align="center" style="padding: 32px 16px;">
        <table role="presentation" class="container" style="width: 600px; max-width: 100%; border-collapse: collapse; background-color: #0a0a0a;">
          
          <!-- Premium Header -->
          <tr>
            <td class="header-cell" style="padding: 48px 40px 40px 40px; text-align: center; border-bottom: 1px solid #1a1a1a;">
              <table role="presentation" style="width: 100%; border-collapse: collapse;">
                <tr>
                  <td align="center">
                    <!-- Logo Mark -->
                    <div style="display: inline-block; margin-bottom: 24px;">
                      <span class="logo-text" style="font-size: 42px; font-weight: 800; color: #ffffff; letter-spacing: -2px;">HPCH</span>
                    </div>
                  </td>
                </tr>
                <tr>
                  <td align="center">
                    <p class="header-title" style="margin: 0; font-size: 11px; font-weight: 600; color: #666666; text-transform: uppercase; letter-spacing: 6px;">TECH STUDIO</p>
                  </td>
                </tr>
                <tr>
                  <td align="center" style="padding-top: 24px;">
                    <div style="width: 40px; height: 1px; background: linear-gradient(90deg, transparent, #333333, transparent);"></div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Inquiry Badge -->
          <tr>
            <td style="padding: 32px 40px 0 40px; text-align: center;">
              <table role="presentation" style="width: 100%; border-collapse: collapse;">
                <tr>
                  <td align="center">
                    <span style="display: inline-block; background-color: #ffffff; color: #000000; padding: 10px 24px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px;">New Project Inquiry</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Client Info Section -->
          <tr>
            <td class="content-cell" style="padding: 40px;">
              <table role="presentation" style="width: 100%; border-collapse: collapse;">
                <!-- Section Label -->
                <tr>
                  <td style="padding-bottom: 24px;">
                    <p class="section-label" style="margin: 0; font-size: 10px; font-weight: 600; color: #444444; text-transform: uppercase; letter-spacing: 2px;">Client Details</p>
                  </td>
                </tr>
                
                <!-- Name Card -->
                <tr>
                  <td style="padding-bottom: 2px;">
                    <table role="presentation" class="info-card" style="width: 100%; border-collapse: collapse; background-color: #111111; padding: 24px;">
                      <tr>
                        <td>
                          <p style="margin: 0 0 8px 0; font-size: 10px; font-weight: 500; color: #555555; text-transform: uppercase; letter-spacing: 1.5px;">Name</p>
                          <p class="info-value" style="margin: 0; font-size: 18px; font-weight: 600; color: #ffffff;">{{from_name}}</p>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
                
                <!-- Email Card -->
                <tr>
                  <td style="padding-bottom: 2px;">
                    <table role="presentation" class="info-card" style="width: 100%; border-collapse: collapse; background-color: #111111; padding: 24px;">
                      <tr>
                        <td>
                          <p style="margin: 0 0 8px 0; font-size: 10px; font-weight: 500; color: #555555; text-transform: uppercase; letter-spacing: 1.5px;">Email Address</p>
                          <p class="info-value" style="margin: 0; font-size: 18px; font-weight: 600; color: #ffffff; word-break: break-all;">
                            <a href="mailto:{{from_email}}" style="color: #ffffff; text-decoration: none;">{{from_email}}</a>
                          </p>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
                
                <!-- Phone Card -->
                <tr>
                  <td>
                    <table role="presentation" class="info-card" style="width: 100%; border-collapse: collapse; background-color: #111111; padding: 24px;">
                      <tr>
                        <td>
                          <p style="margin: 0 0 8px 0; font-size: 10px; font-weight: 500; color: #555555; text-transform: uppercase; letter-spacing: 1.5px;">Phone Number</p>
                          <p class="info-value" style="margin: 0; font-size: 18px; font-weight: 600; color: #ffffff;">
                            <a href="tel:{{from_phone}}" style="color: #ffffff; text-decoration: none;">{{from_phone}}</a>
                          </p>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Message Section -->
          <tr>
            <td class="message-cell" style="padding: 0 40px 40px 40px;">
              <table role="presentation" style="width: 100%; border-collapse: collapse;">
                <tr>
                  <td style="padding-bottom: 24px;">
                    <p class="section-label" style="margin: 0; font-size: 10px; font-weight: 600; color: #444444; text-transform: uppercase; letter-spacing: 2px;">Project Brief</p>
                  </td>
                </tr>
                <tr>
                  <td>
                    <div style="background-color: #111111; padding: 32px; border-left: 3px solid #ffffff;">
                      <p class="message-text" style="margin: 0; font-size: 16px; line-height: 1.8; color: #cccccc; font-style: italic;">{{message}}</p>
                    </div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- CTA Section -->
          <tr>
            <td class="cta-cell" style="padding: 0 40px 48px 40px;">
              <table role="presentation" style="width: 100%; border-collapse: collapse;">
                <tr>
                  <td align="center">
                    <a href="mailto:{{from_email}}" class="cta-button" style="display: inline-block; background-color: #ffffff; color: #000000; padding: 18px 48px; font-size: 11px; font-weight: 700; text-decoration: none; text-transform: uppercase; letter-spacing: 3px;">Respond to Inquiry</a>
                  </td>
                </tr>
                <tr>
                  <td align="center" style="padding-top: 16px;">
                    <p style="margin: 0; font-size: 11px; color: #444444;">or call directly at <a href="tel:{{from_phone}}" style="color: #888888; text-decoration: none;">{{from_phone}}</a></p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding: 0 40px;">
              <div style="height: 1px; background: linear-gradient(90deg, transparent, #222222, transparent);"></div>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td class="footer-cell" style="padding: 40px; text-align: center;">
              <table role="presentation" style="width: 100%; border-collapse: collapse;">
                <tr>
                  <td align="center" style="padding-bottom: 16px;">
                    <span style="font-size: 18px; font-weight: 800; color: #333333; letter-spacing: -1px;">HPCH</span>
                  </td>
                </tr>
                <tr>
                  <td align="center">
                    <p style="margin: 0 0 8px 0; font-size: 11px; color: #333333; letter-spacing: 1px;">Crafting Digital Excellence</p>
                    <p style="margin: 0; font-size: 10px; color: #222222;">© 2026 HPCH Tech. All rights reserved.</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
